<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BusTrack Live</title>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; }
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: #0f172a;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
    }
    #topbar h1 { font-size: 1.1rem; color: #38bdf8; }
    #map { height: 100vh; width: 100%; }
    #infoPanel {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      border-radius: 16px;
      padding: 16px 24px;
      z-index: 1000;
      display: flex;
      gap: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border: 1px solid #334155;
    }
    .info-item { text-align: center; }
    .info-label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; }
    .info-value { font-size: 1.3rem; font-weight: bold; color: #38bdf8; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ef4444; display: inline-block; margin-right: 6px;
    }
    .dot.live { background: #22c55e; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #statusText { font-size: 0.8rem; color: #94a3b8; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>🚌 BusTrack Live</h1>
  <div>
    <span class="dot" id="dot"></span>
    <span id="statusText">Waiting for bus...</span>
  </div>
</div>

<div id="map"></div>

<div id="infoPanel">
  <div class="info-item">
    <div class="info-label">ETA</div>
    <div class="info-value" id="etaVal">--</div>
  </div>
  <div class="info-item">
    <div class="info-label">Distance</div>
    <div class="info-value" id="distVal">--</div>
  </div>
  <div class="info-item">
    <div class="info-label">Speed</div>
    <div class="info-value" id="speedVal">--</div>
  </div>
  <div class="info-item">
    <div class="info-label">Updated</div>
    <div class="info-value" id="timeVal">--</div>
  </div>
</div>

<script>
  const socket = io();

  const map = L.map('map').setView([10.9141, 79.4453], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  const busIcon = L.divIcon({
    html: `<div style="background:#38bdf8;border-radius:50%;width:40px;height:40px;
           display:flex;align-items:center;justify-content:center;font-size:20px;
           box-shadow:0 0 0 8px rgba(56,189,248,0.25)">🚌</div>`,
    className: '', iconSize: [40, 40], iconAnchor: [20, 20]
  });

  const userIcon = L.divIcon({
    html: `<div style="background:#f59e0b;border-radius:50%;width:32px;height:32px;
           display:flex;align-items:center;justify-content:center;font-size:16px;
           box-shadow:0 0 0 6px rgba(245,158,11,0.25)">🧍</div>`,
    className: '', iconSize: [32, 32], iconAnchor: [16, 16]
  });

  let busMarker = null;
  let userMarker = null;
  let userLocation = null;
  let busLocation = null;
  const pathCoords = [];
  const pathLine = L.polyline([], { color: '#38bdf8', weight: 3, opacity: 0.5 }).addTo(map);

  // Track USER live location
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      (pos) => {
        userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        const userLatLng = L.latLng(userLocation.lat, userLocation.lng);
        if (!userMarker) {
          userMarker = L.marker(userLatLng, { icon: userIcon })
            .addTo(map).bindPopup('🧍 You are here');
          map.setView(userLatLng, 15);
        } else {
          userMarker.setLatLng(userLatLng);
        }
        if (busLocation) updateETA();
      },
      (err) => console.log('User location error:', err.message),
      { enableHighAccuracy: true, maximumAge: 3000 }
    );
  }

  // Receive BUS live location
  socket.on('connect', () => {
    document.getElementById('dot').classList.add('live');
    document.getElementById('statusText').textContent = 'Connected';
  });

  socket.on('disconnect', () => {
    document.getElementById('dot').classList.remove('live');
    document.getElementById('statusText').textContent = 'Reconnecting...';
  });

  socket.on('bus:update', (data) => {
    busLocation = data;
    const newLatLng = L.latLng(data.lat, data.lng);

    document.getElementById('dot').classList.add('live');
    document.getElementById('statusText').textContent = 'Bus is Live 🟢';
    document.getElementById('timeVal').textContent = new Date().toLocaleTimeString();

    if (!busMarker) {
      busMarker = L.marker(newLatLng, { icon: busIcon }).addTo(map);
    } else {
      animateMarker(busMarker, busMarker.getLatLng(), newLatLng, 1500);
    }

    pathCoords.push(newLatLng);
    pathLine.setLatLngs(pathCoords);
    updateETA();
  });

  // Compare bus vs user → real ETA
  function updateETA() {
    if (!busLocation || !userLocation) return;

    const dist = getDistance(
      busLocation.lat, busLocation.lng,
      userLocation.lat, userLocation.lng
    );
    const speed = busLocation.avgSpeed || 20;
    const eta = (dist / speed) * 60;

    document.getElementById('distVal').textContent =
      dist < 1 ? `${(dist * 1000).toFixed(0)}m` : `${dist.toFixed(2)}km`;
    document.getElementById('etaVal').textContent =
      dist < 0.05 ? '🚌 Arriving!' :
      eta < 1 ? '< 1 min' :
      `${Math.round(eta)} min`;
    document.getElementById('speedVal').textContent = `${speed.toFixed(0)}km/h`;
  }

  function animateMarker(marker, from, to, duration) {
    const start = performance.now();
    function step(now) {
      const t = Math.min((now - start) / duration, 1);
      marker.setLatLng([
        from.lat + (to.lat - from.lat) * t,
        from.lng + (to.lng - from.lng) * t
      ]);
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function getDistance(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) ** 2 +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }
</script>
</body>
</html>
